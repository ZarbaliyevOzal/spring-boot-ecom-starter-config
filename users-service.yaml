spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9090/realms/ecom_starter
  datasource:
    url: jdbc:postgresql://localhost:5432/springboot_ecom_users
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: 10010

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka