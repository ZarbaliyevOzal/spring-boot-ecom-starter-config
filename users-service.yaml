spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/users_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQL10Dialect
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8081
  servlet:
    context-path: /api

logging:
  level:
    root: INFO
    com.example: DEBUG